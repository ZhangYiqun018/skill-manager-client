name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install zlib via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows-static-md
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install

      # Build with code signing (when Apple certificate is configured)
      - uses: tauri-apps/tauri-action@v0.5
        if: runner.os != 'macOS' || env.HAVE_APPLE_CERT == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAVE_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: "Skill Manager v__VERSION__"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/ZhangYiqun018/skill-manager-client/blob/main/CHANGELOG.md) for full release notes.

            ---
            > Pick the asset for your platform below.
            > 请在下方选择对应平台的安装包。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Build without code signing (macOS fallback — ad-hoc sign with "-")
      - uses: tauri-apps/tauri-action@v0.5
        if: runner.os == 'macOS' && env.HAVE_APPLE_CERT != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAVE_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
          # Ad-hoc signing: no certificate needed, required for aarch64 binaries to run
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: "Skill Manager v__VERSION__"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/ZhangYiqun018/skill-manager-client/blob/main/CHANGELOG.md) for full release notes.

            ---
            > Pick the asset for your platform below.
            > 请在下方选择对应平台的安装包。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
